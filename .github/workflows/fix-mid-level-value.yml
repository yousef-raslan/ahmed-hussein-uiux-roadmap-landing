name: Fix Mid-Level Value

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-mid-level:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Align Mid-Level value with Apps Script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('data-value="Mid-Level">Mid-Level</button>', 'data-value="Middle Level">Mid-Level</button>')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix if needed
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix Mid-Level submitted value"
          git push
