name: Patch Apps Script API URL

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-api-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch index.html API URL
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          api_url = 'https://script.google.com/macros/s/AKfycbwY099FdF_Egd-Shi1LnIZWJF6oXptVbd00OybsVwS8u1TKXGkm4Nh3y2u9QuRzMjeoUw/exec'
          old = "const API_URL = 'PASTE_APPS_SCRIPT_WEB_APP_URL_HERE';"
          new = f"const API_URL = '{api_url}';"

          text = path.read_text(encoding='utf-8')
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          elif new in text:
              print('API URL already patched.')
          else:
              raise SystemExit('API URL placeholder not found in index.html')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add index.html
            git commit -m "Connect Apps Script API URL"
            git push
          fi
