<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahmed Hussein | أفضل Roadmap لـ UI/UX في عصر الـ AI</title>
  <meta name="description" content="احجز مكانك في سيشن مجانية مباشرة عن أفضل Roadmap لـ UI/UX في عصر الـ AI مع Ahmed Hussein." />
  <meta name="theme-color" content="#02070E" />
  <meta property="og:title" content="أفضل Roadmap لـ UI/UX في عصر الـ AI" />
  <meta property="og:description" content="أنت مش محتاج Roadmap أطول. أنت محتاج Roadmap أذكى." />
  <meta property="og:type" content="website" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap');

    :root {
      --container: 1180px;
      --font: 'IBM Plex Sans Arabic', Tahoma, Arial, sans-serif;
      --bg-1: #02070E;
      --bg-2: #05101B;
      --bg-3: #02060C;
      --surface: rgba(8, 18, 30, .72);
      --surface-strong: rgba(10, 23, 38, .92);
      --surface-soft: rgba(255, 255, 255, .035);
      --field: rgba(255, 255, 255, .052);
      --line: rgba(244, 223, 165, .20);
      --line-soft: rgba(255, 255, 255, .08);
      --text: #F8F4EA;
      --text-strong: #FFFFFF;
      --muted: #A9B4C3;
      --muted-2: #7E8A9A;
      --gold-1: #F4DFA5;
      --gold-2: #D6B76A;
      --gold-3: #B98D39;
      --gold-rgb: 214,183,106;
      --success: #31D17D;
      --error: #ff6b6b;
      --ease: cubic-bezier(.22, 1, .36, 1);
      --shadow: 0 30px 92px rgba(0,0,0,.50);
      --poster-shadow: 0 32px 94px rgba(0,0,0,.56);
      --focus: rgba(244,223,165,.50);
      --page-pad: clamp(10px, 3.7vw, 24px);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #000; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 11% 6%, rgba(var(--gold-rgb),.17), transparent 24%),
        radial-gradient(circle at 92% 10%, rgba(26,78,130,.12), transparent 25%),
        radial-gradient(circle at 48% 100%, rgba(var(--gold-rgb),.09), transparent 33%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 58%, var(--bg-3));
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .34;
      background-image:
        linear-gradient(90deg, rgba(244,223,165,.08) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at 52% 18%, #000, transparent 72%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: auto -10% -35% -10%;
      height: 55vh;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(var(--gold-rgb),.13), transparent 68%);
      filter: blur(30px);
    }

    a { color: inherit; text-decoration: none; }
    img, svg { display: block; max-width: 100%; }
    button, input, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    .ltr, bdi { direction: ltr; unicode-bidi: isolate; display: inline-block; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .icon { width: 20px; height: 20px; flex: 0 0 auto; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .gold-text {
      color: transparent;
      background: linear-gradient(135deg, var(--gold-1) 0%, var(--gold-2) 45%, var(--gold-3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .shell {
      width: min(var(--container), calc(100% - (var(--page-pad) * 2)));
      margin-inline: auto;
      padding: 40px 0 56px;
    }

    .page-layout {
      direction: ltr;
      display: grid;
      grid-template-columns: minmax(320px, 456px) minmax(0, 650px);
      gap: clamp(48px, 5.3vw, 72px);
      justify-content: center;
      align-items: stretch;
    }

    .poster-col { grid-column: 1; direction: rtl; align-self: stretch; min-width: 0; display: flex; justify-content: center; position: relative; }
    .poster-sticky { position: relative; top: auto; width: min(100%, 456px); margin-inline: auto; height: fit-content; align-self: flex-start; will-change: transform; transform: translate3d(0,0,0); }
    .right-flow { grid-column: 2; direction: rtl; min-width: 0; width: min(100%, 650px); }
    .content-flow { display: grid; gap: 18px; min-width: 0; }

    .logo-link {
      width: min(252px, 64vw);
      display: block;
      margin: 0 auto 34px;
      border-radius: 8px;
      outline: none;
      transition: transform .22s var(--ease), opacity .22s var(--ease);
    }
    .logo-link:hover { transform: translateY(-1px); opacity: .96; }
    .logo-link:focus-visible { box-shadow: 0 0 0 4px rgba(var(--gold-rgb), .18); }
    .site-logo { width: 100%; height: auto; object-fit: contain; }

    .poster-frame {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      width: min(100%, 456px);
      margin-inline: auto;
      aspect-ratio: 4 / 5;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(255,255,255,.04);
      box-shadow: var(--poster-shadow);
      transform: translateZ(0);
    }
    .poster-frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(145deg, rgba(255,255,255,.16), transparent 30%, rgba(var(--gold-rgb),.24) 100%),
        radial-gradient(circle at 18% 12%, rgba(var(--gold-rgb),.32), transparent 18%);
      mix-blend-mode: screen;
      opacity: .66;
    }
    .poster-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.07), inset 0 -40px 80px rgba(0,0,0,.16);
    }
    .poster-img { width: 100%; height: 100%; object-fit: cover; object-position: center; }

    .badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 4px; }
    .badge {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--gold-2);
      background: rgba(var(--gold-rgb),.08);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .badge .icon { width: 16px; height: 16px; }

    .hero-copy { text-align: center; display: grid; justify-items: center; gap: 14px; }
    .title {
      margin: 0;
      color: var(--text-strong);
      font-size: clamp(38px, 5.2vw, 62px);
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -.035em;
      max-width: 640px;
      text-wrap: balance;
    }
    .title .gold-text { font-weight: 800; }
    .lead {
      margin: 0;
      max-width: 610px;
      color: var(--muted);
      font-size: clamp(15px, 1.45vw, 18px);
      font-weight: 500;
      line-height: 2;
      text-align: center;
    }
    .lead strong { color: #D8DEE8; font-weight: 700; }

    .btn {
      min-height: 54px;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 20px;
      border: 1px solid transparent;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
      cursor: pointer;
      user-select: none;
      transition: transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease), box-shadow .18s var(--ease), opacity .18s var(--ease);
    }
    .btn:active { transform: translateY(1px) scale(.995); }
    .btn:disabled { opacity: .62; cursor: not-allowed; }
    .btn-primary {
      color: #111319;
      background: linear-gradient(135deg, var(--gold-1) 0%, var(--gold-2) 58%, var(--gold-3) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.48), 0 16px 34px rgba(var(--gold-rgb),.16);
    }
    .btn-primary:hover { box-shadow: inset 0 1px 0 rgba(255,255,255,.52), 0 18px 40px rgba(var(--gold-rgb),.22); }
    .btn-secondary { color: var(--text-strong); background: rgba(255,255,255,.026); border-color: var(--line); }
    .btn-secondary:hover { background: rgba(var(--gold-rgb),.075); }
    .hero-cta { max-width: 490px; margin: 2px auto 0; }

    .card {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .speaker-card {
      margin-top: 2px;
      padding: 18px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 18% 14%, rgba(var(--gold-rgb), .10), transparent 28%),
        linear-gradient(180deg, rgba(8, 18, 30, .70), rgba(8, 18, 30, .58));
    }
    .speaker-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 84px;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }
    .speaker-content { min-width: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    .speaker-label {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid rgba(var(--gold-rgb), .25);
      color: var(--gold-2);
      background: rgba(var(--gold-rgb), .07);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
    }
    .speaker-name {
      margin: 0;
      direction: ltr;
      text-align: left;
      color: var(--text-strong);
      font-size: clamp(28px, 3.2vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.03em;
      white-space: nowrap;
    }
    .speaker-role {
      display: block;
      direction: ltr;
      text-align: left;
      color: var(--gold-2);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      margin-top: 6px;
    }
    .speaker-img {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      overflow: hidden;
      border: 3px solid rgba(var(--gold-rgb), .86);
      background: var(--surface-strong);
      box-shadow: 0 0 0 8px rgba(var(--gold-rgb), .08);
    }
    .speaker-img img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .speaker-bio {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.95;
      text-align: right;
    }
    .speaker-tags {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
      padding-inline: 6px;
    }
    .speaker-tag {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line-soft);
      color: #D8DEE8;
      background: rgba(255,255,255,.035);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .faq-card {
      overflow: hidden;
      border-radius: 28px;
    }
    .faq-title {
      margin: 0 0 10px;
      padding: 16px 18px 0;
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
    }
    .faq-item { border-top: 1px solid var(--line-soft); }
    .faq-item:first-of-type { border-top-color: transparent; }
    .faq-toggle {
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 18px;
      border: 0;
      color: var(--text-strong);
      background: transparent;
      cursor: pointer;
      text-align: right;
    }
    .faq-question { font-size: 15px; font-weight: 700; line-height: 1.5; }
    .faq-toggle .icon { color: var(--gold-2); transition: transform .2s var(--ease); }
    .faq-item.open .faq-toggle .icon { transform: rotate(180deg); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.95;
      transition: max-height .26s var(--ease);
    }
    .faq-answer p { margin: 0; padding: 0 18px 16px; }

    .session-meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .meta-item {
      direction: rtl;
      display: grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 13px 15px;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: rgba(255,255,255,.03);
    }
    .meta-label { grid-column: 1; justify-self: start; display: inline-flex; flex-direction: row; align-items: center; gap: 8px; color: var(--muted-2); font-size: 12px; font-weight: 700; line-height: 1.45; white-space: nowrap; }
    .meta-label .icon { width: 18px; height: 18px; color: var(--gold-2); }
    .meta-value { grid-column: 3; justify-self: end; color: var(--text-strong); font-size: 15px; font-weight: 700; line-height: 1.42; white-space: nowrap; text-align: left; }

    .booking-card {
      overflow: hidden;
      position: relative;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(10, 23, 38, .88), rgba(7, 17, 31, .78));
    }
    .booking-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .45;
      background:
        radial-gradient(circle at 14% 0%, rgba(var(--gold-rgb),.18), transparent 26%),
        linear-gradient(110deg, transparent 0 38%, rgba(255,255,255,.05) 46%, transparent 54% 100%);
    }
    .booking-inner { position: relative; z-index: 1; padding: 16px; }
    .booking-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
    .booking-title { margin: 0; color: var(--text-strong); font-size: 27px; font-weight: 700; line-height: 1.28; letter-spacing: -.025em; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; min-height: 34px; padding: 0 12px; border-radius: 999px; color: var(--gold-2); background: rgba(var(--gold-rgb),.08); border: 1px solid rgba(var(--gold-rgb),.22); font-size: 12px; font-weight: 800; white-space: nowrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 14px rgba(49,209,125,.62); animation: pulse 1.8s infinite; }
    .status-pill.full .status-dot,
    .status-pill.closed .status-dot { background: var(--error); box-shadow: 0 0 14px rgba(255,107,107,.48); animation: none; }
    .seat-box { margin-bottom: 14px; border: 1px solid var(--line-soft); border-radius: 20px; background: rgba(255,255,255,.03); padding: 14px; }
    .seat-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .seat-text { color: var(--muted); font-size: 13px; font-weight: 600; }
    .seat-count { color: var(--text-strong); font-size: 16px; font-weight: 800; }
    .progress { overflow: hidden; height: 10px; border-radius: 999px; background: rgba(255,255,255,.07); }
    .progress-bar { height: 100%; width: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-3)); box-shadow: 0 0 22px rgba(var(--gold-rgb),.24); transition: width .45s var(--ease); }

    .form { display: grid; gap: 12px; }
    .field { display: grid; gap: 7px; }
    .label { color: #D8DEE8; font-size: 13px; font-weight: 700; }
    .input-wrap {
      position: relative;
      color: var(--muted-2);
    }
    .input-wrap .icon {
      position: absolute;
      inset-inline-start: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      color: var(--gold-2);
      opacity: .85;
    }
    input, select {
      width: 100%;
      height: 54px;
      padding: 0 44px 0 14px;
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      color: var(--text-strong);
      background: var(--field);
      outline: none;
      transition: border-color .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease);
    }
    select { appearance: none; cursor: pointer; color-scheme: dark; }
    input::placeholder { color: var(--muted-2); }
    input:focus, select:focus { border-color: var(--focus); box-shadow: 0 0 0 4px rgba(var(--gold-rgb), .10); background: rgba(255,255,255,.065); }
    .select-wrap::after { content: ""; position: absolute; inset-inline-end: 16px; top: 50%; width: 8px; height: 8px; border-inline-end: 2px solid var(--gold-2); border-bottom: 2px solid var(--gold-2); transform: translateY(-62%) rotate(45deg); pointer-events: none; opacity: .86; }
    .field-hint { color: var(--muted-2); font-size: 12px; font-weight: 600; line-height: 1.65; }
    .form-actions { display: grid; gap: 10px; margin-top: 4px; }
    .form-note { margin: 4px 0 0; color: var(--muted-2); font-size: 12px; font-weight: 600; line-height: 1.75; text-align: center; }
    .site-footer { margin: 36px auto 0; color: var(--muted-2); font-size: 12px; font-weight: 700; line-height: 1.7; text-align: center; }

    .toast {
      position: fixed;
      inset-inline: 0;
      top: 22px;
      z-index: 100;
      width: max-content;
      max-width: calc(100% - 28px);
      margin-inline: auto;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text-strong);
      background: color-mix(in srgb, var(--surface-strong) 94%, transparent);
      box-shadow: 0 18px 58px rgba(0,0,0,.34);
      backdrop-filter: blur(18px);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: .22s var(--ease);
    }
    .toast.show { opacity: 1; visibility: visible; transform: translateY(0); }
    .toast.warning {
      border-color: rgba(245,158,11,.45);
      color: #FFE8B5;
      background: linear-gradient(135deg, rgba(245,158,11,.22), rgba(10,23,38,.94));
      box-shadow: 0 18px 58px rgba(0,0,0,.34), 0 0 0 1px rgba(245,158,11,.10), 0 0 28px rgba(245,158,11,.12);
    }
    .toast.error {
      border-color: rgba(255,107,107,.48);
      color: #FFD1D1;
      background: linear-gradient(135deg, rgba(255,107,107,.22), rgba(10,23,38,.94));
      box-shadow: 0 18px 58px rgba(0,0,0,.34), 0 0 0 1px rgba(255,107,107,.10), 0 0 28px rgba(255,107,107,.12);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      transition: .24s var(--ease);
    }
    .modal.show { opacity: 1; visibility: visible; }
    .success-card {
      position: relative;
      overflow: hidden;
      width: min(100%, 444px);
      padding: 28px 20px 20px;
      border: 1px solid var(--line);
      border-radius: 30px;
      color: var(--text-strong);
      background:
        radial-gradient(circle at 50% -8%, rgba(var(--gold-rgb),.22), transparent 42%),
        color-mix(in srgb, var(--bg-2) 94%, #fff 6%);
      box-shadow: 0 36px 110px rgba(0,0,0,.48);
      text-align: center;
      transform: translateY(12px) scale(.985);
      transition: .26s var(--ease);
    }
    .modal.show .success-card { transform: translateY(0) scale(1); }
    .success-icon { position: relative; z-index: 1; width: 72px; height: 72px; margin: 0 auto 16px; display: grid; place-items: center; border-radius: 50%; color: #111319; background: linear-gradient(135deg, var(--gold-1), var(--gold-2)); box-shadow: 0 0 0 12px rgba(var(--gold-rgb),.10); }
    .success-icon .icon { width: 34px; height: 34px; stroke-width: 2.4; }
    .success-title { position: relative; z-index: 1; margin: 0; color: var(--text-strong); font-size: 29px; font-weight: 700; line-height: 1.32; letter-spacing: -.025em; }
    .success-text { position: relative; z-index: 1; margin: 12px auto 0; max-width: 350px; color: var(--muted); font-size: 15px; font-weight: 500; line-height: 1.95; }
    .success-info { position: relative; z-index: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 38px; margin-top: 14px; padding: 0 14px; border: 1px solid var(--line); border-radius: 999px; color: var(--gold-2); background: rgba(var(--gold-rgb),.08); font-size: 13px; font-weight: 700; line-height: 1; }
    .success-actions { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .community-link { position: relative; z-index: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; color: var(--gold-2); font-size: 13px; font-weight: 800; line-height: 1.6; text-decoration: none; border-bottom: 1px solid rgba(var(--gold-rgb), .32); }
    .community-link:hover { color: var(--gold-1); border-bottom-color: var(--gold-1); }

    @keyframes sheen { 0%, 54% { background-position: 150% 0; } 72%, 100% { background-position: -150% 0; } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(49,209,125,.42), 0 0 14px rgba(49,209,125,.55); } 70% { box-shadow: 0 0 0 10px rgba(49,209,125,0), 0 0 14px rgba(49,209,125,.38); } 100% { box-shadow: 0 0 0 0 rgba(49,209,125,0), 0 0 14px rgba(49,209,125,.38); } }

    @media (max-width: 979px) {
      .shell { width: min(100% - (var(--page-pad) * 2), 398px); padding: 24px 0 42px; }
      .page-layout { display: grid; grid-template-columns: 1fr; gap: 20px; direction: rtl; }
      .right-flow { display: contents; }
      .logo-link { order: 1; margin: 0 auto 8px; width: min(200px, 58vw); }
      .poster-col { order: 2; width: 100%; position: static; top: auto; height: auto; }
      .poster-sticky { position: static; width: 100%; display: flex; justify-content: center; transform: none !important; }
      .poster-frame { width: min(100%, 398px); border-radius: 26px; }
      .content-flow { order: 3; width: 100%; gap: 20px; }
      .title { font-size: clamp(36px, 9.1vw, 42px); line-height: 1.22; }
      .lead { font-size: 15px; line-height: 2; }
      .badges { justify-content: center; gap: 7px; }
      .badge { min-height: 30px; font-size: 11.5px; padding-inline: 14px; }
      .speaker-card { border-radius: 24px; }
      .speaker-head { grid-template-columns: 84px minmax(0, 1fr); direction: ltr; align-items: center; }
      .speaker-img { grid-column: 1; grid-row: 1; }
      .speaker-content { grid-column: 2; grid-row: 1; text-align: left; align-items: flex-start; }
      .speaker-label { align-self: flex-end; }
      .speaker-name, .speaker-role { text-align: left; }
      .speaker-bio { font-size: 15px; line-height: 1.95; }
      .session-meta { grid-template-columns: 1fr; }
      .booking-inner { padding: 16px; }
      .booking-head { align-items: center; }
      .booking-title { font-size: 25px; }
      .site-footer { margin-top: 30px; margin-bottom: 8px; }
    }

    @media (max-width: 520px) {
      .poster-col { justify-content: center; }
      .poster-frame { max-width: calc(100vw - 20px); }
      .btn { font-size: 16px; font-weight: 800; }
    }

    @media (max-width: 390px) {
      .shell { width: min(100% - 20px, 398px); }
      .speaker-card { padding: 16px; }
      .speaker-head { grid-template-columns: 76px minmax(0, 1fr); gap: 13px; }
      .speaker-img { width: 76px; height: 76px; }
      .speaker-name { font-size: 25px; }
      .speaker-role { font-size: 12px; }
      .speaker-tags { grid-template-columns: repeat(2, minmax(0, 1fr)); padding-inline: 0; }
      .success-actions { grid-template-columns: 1fr; }
    }

    @media (min-width: 980px) and (max-width: 1180px) {
      .page-layout { grid-template-columns: minmax(320px, 420px) minmax(0, 610px); gap: 42px; }
      .logo-link { width: 230px; margin-bottom: 26px; }
      .title { font-size: clamp(44px, 5vw, 56px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
